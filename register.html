<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SpazaSure</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #F3F4F6; display: flex; justify-content: center; padding: 20px; }
        .form-card { background: white; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; border-bottom: 10px solid #1E3A8A; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #E11D48; color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2 style="color: #1E3A8A;">Create Store Profile</h2>
        <form id="regForm">
            <input type="text" id="first_name" placeholder="First Name" required>
            <input type="text" id="last_name" placeholder="Last Name" required>
            <input type="tel" id="phone" placeholder="WhatsApp Number" required>
            <input type="text" id="store_name" placeholder="Store Name" required>
            <select id="township">
                <option value="Umlazi">Umlazi</option>
                <option value="Kwa-Mashu">Kwa-Mashu</option>
                <option value="Inanda">Inanda</option>
            </select>
            <select id="business_type">
                <option value="Spaza Shop">Spaza Shop</option>
                <option value="Tuck Shop">Tuck Shop</option>
            </select>
            <button type="submit" id="btn">REGISTER NOW</button>
        </form>
    </div>

    <script>
        const _supabaseUrl = 'https://clbhfxqxcugxcqutngpo.supabase.co';
        const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsYmhmeHF4Y3VneGNxdXRuZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MzgxMDMsImV4cCI6MjA4NzQxNDEwM30.VWj5TGjAQhj77BZyoSUmynUPDPTVGL_pAKNyrlpQR1Y';
        const _client = supabase.createClient(_supabaseUrl, _supabaseKey);

        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.innerText = "Saving...";
            const data = {
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                whatsapp_number: document.getElementById('phone').value,
                store_name: document.getElementById('store_name').value,
                township: document.getElementById('township').value,
                business_type: document.getElementById('business_type').value
            };
            const { error } = await _client.from('profiles').insert([data]);
            if(error) alert(error.message);
            else { alert("Success!"); window.location.href = "index.html"; }
        };
    </script>
</body>
</html>
