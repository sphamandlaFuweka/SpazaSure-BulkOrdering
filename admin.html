<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpazaSure | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-blue-900 text-white p-6 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic uppercase">SpazaSure Admin</h1>
            <span class="bg-red-600 text-[10px] font-black px-3 py-1 rounded-full uppercase">Live Dashboard</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Total Revenue</p>
                <p id="total-revenue" class="text-4xl font-black text-blue-900">R 0.00</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Total Orders</p>
                <p id="order-count" class="text-4xl font-black text-blue-900">0</p>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-100">
                    <tr>
                        <th class="p-5 text-[10px] font-black text-gray-400 uppercase">Store</th>
                        <th class="p-5 text-[10px] font-black text-gray-400 uppercase">Items</th>
                        <th class="p-5 text-[10px] font-black text-gray-400 uppercase">Total Amount</th>
                    </tr>
                </thead>
                <tbody id="admin-orders-table" class="divide-y divide-gray-50"></tbody>
            </table>
        </div>
    </main>

    <script>
        const _supabaseUrl = 'https://clbhfxqxcugxcqutngpo.supabase.co';
        const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsYmhmeHF4Y3VneGNxdXRuZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MzgxMDMsImV4cCI6MjA4NzQxNDEwM30.VWj5TGjAQhj77BZyoSUmynUPDPTVGL_pAKNyrlpQR1Y';
        const _spazaClient = supabase.createClient(_supabaseUrl, _supabaseKey);

        async function loadAdminData() {
            const { data: orders } = await _spazaClient.from('orders').select('*').order('created_at', { ascending: false });
            const table = document.getElementById('admin-orders-table');
            let rev = 0;
            table.innerHTML = orders.map(o => {
                rev += o.total_amount;
                return `<tr class="hover:bg-gray-50">
                    <td class="p-5 font-bold text-blue-900">${o.store_name}</td>
                    <td class="p-5 text-xs text-gray-500">${o.items.length} Pallets</td>
                    <td class="p-5 font-black">R ${o.total_amount.toFixed(2)}</td>
                </tr>`;
            }).join('');
            document.getElementById('total-revenue').innerText = "R " + rev.toFixed(2);
            document.getElementById('order-count').innerText = orders.length;
        }
        loadAdminData();
        setInterval(loadAdminData, 5000); // Live update every 5 seconds
    </script>
</body>
</html>
