    function showError(elementId, message) {
        const el = document.getElementById(elementId);

        document.getElementById('auth-login').classList.toggle('hidden', showReg);
        document.getElementById('auth-register').classList.toggle('hidden', !showReg);
    }

    async function handleLogin() {
        const wa = document.getElementById('login-wa').value.trim();
        if (!wa) {
            showError('login-error', "Please enter your WhatsApp number");
            return;
        }
        
        const { data, error } = await _client.from('profiles').select('*').eq('whatsapp_number', wa).maybeSingle();
        if(error) {
            showError('login-error', "Error logging in. Please try again.");
            console.error(error);
        } else if(data) {
            loginSuccess(data);
        } else {
            showError('login-error', "Store not found. Please register.");
        }
    }

    async function handleRegister() {
        const payload = {
            first_name: document.getElementById('reg-fname').value,
            last_name: document.getElementById('reg-lname').value,
            store_name: document.getElementById('reg-sname').value,
            whatsapp_number: parseInt(document.getElementById('reg-wa').value),
            business_type: document.getElementById('reg-bus-type').value,
            store_size: document.getElementById('reg-size').value,
            township: document.getElementById('reg-town').value,
            address: document.getElementById('reg-address').value,
            gender: document.getElementById('reg-gender').value,
            role: 'spaza',
            is_verified: false
        };

        // Validate required fields
        for (let [key, value] of Object.entries(payload)) {
            if (!value && key !== 'role' && key !== 'is_verified') {
                showError('register-error', `Please fill in ${key.replace('_', ' ')}`);
                return;
            }
        }

        const { data, error } = await _client.from('profiles').insert([payload]).select().single();
        if(error) {
            showError('register-error', "Error: " + error.message);
        } else {
            loginSuccess(data);
        }
    }

    function loginSuccess(user) {
        currentUser = user;
        localStorage.setItem('spaza_user', JSON.stringify(user));
        initApp();
    }

    async function initApp() {
        document.getElementById('section-auth').classList.add('hidden');
        document.getElementById('section-market').classList.remove('hidden');
        document.getElementById('txt-store-name').innerText = currentUser.store_name;
        document.getElementById('txt-badge').innerText = currentUser.is_verified ? 'VERIFIED' : 'PENDING';
        document.getElementById('txt-badge').style.background = currentUser.is_verified ? 'var(--green)' : 'var(--yellow)';
        
        // Load image map first
        await loadImageMap();
        await loadContent();
    }

    // NEW: Load all image filenames from storage
    async function loadImageMap() {
        try {
            const { data: files, error } = await _client
                .storage
                .from('Images')
                .list();
            
            if (error) {
                console.error("Error loading image map:", error);
                return;
            }
            
            // Create a map of product name to filename
            files.forEach(file => {
                const fileName = file.name;
                // Remove extension
                const baseName = fileName.replace(/\.[^/.]+$/, "").toLowerCase();
                // Also store cleaned version without special chars
                const cleanName = baseName.replace(/[^a-z0-9]/g, '');
                imageFileMap.set(baseName, fileName);
                imageFileMap.set(cleanName, fileName);
            });
            
            console.log("✅ Loaded", imageFileMap.size, "image mappings");
        } catch (error) {
            console.error("Error loading image map:", error);
        }
    }

    // NEW: Get image URL from map or cache
    function getImageUrl(productName) {
        // Check cache first
        if (imageUrlCache.has(productName)) {
            return imageUrlCache.get(productName);
        }
        
        const baseUrl = "https://clbhfxqxcugxcqutngpo.supabase.co/storage/v1/object/public/Images/";
        const normalizedName = productName.toLowerCase();
        const cleanName = normalizedName.replace(/[^a-z0-9]/g, '');
        
        // Try to find matching file in our map
        let matchedFile = null;
        
        // Try exact match
        if (imageFileMap.has(normalizedName)) {
            matchedFile = imageFileMap.get(normalizedName);
        }
        // Try clean match
        else if (imageFileMap.has(cleanName)) {
            matchedFile = imageFileMap.get(cleanName);
        }
        // Try partial match
        else {
            for (let [key, filename] of imageFileMap.entries()) {
                if (normalizedName.includes(key) || key.includes(normalizedName) || 
                    cleanName.includes(key) || key.includes(cleanName)) {
                    matchedFile = filename;
                    break;
                }
            }
        }
        
        if (matchedFile) {
            const url = baseUrl + encodeURIComponent(matchedFile);
            imageUrlCache.set(productName, url);
            return url;
        }
        
        // Fallback to placeholder
        const placeholder = `https://via.placeholder.com/150/1E3A8A/ffffff?text=${encodeURIComponent(productName.substring(0, 20))}`;
        imageUrlCache.set(productName, placeholder);
        return placeholder;
    }

    function updateCart(name, price, change) {
        if(!cart[name]) cart[name] = { price: price, qty: 0 };
        cart[name].qty += change;
        if(cart[name].qty <= 0) {
            delete cart[name];
        }
        updateTotal();
        renderList();
    }

    function updateTotal() {
        let total = 0;
        Object.values(cart).forEach(item => {
            total += item.price * item.qty;
        });
        document.getElementById('txt-total').innerText = "R " + total.toFixed(2);
    }

    // PDF Receipt Generation Function
    async function generatePDFReceipt(order) {
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Set document properties
            doc.setFontSize(20);
            doc.setTextColor(30, 58, 138); // --blue color
            doc.text('SPAZASURE', 105, 20, { align: 'center' });
            
            doc.setFontSize(10);
            doc.setTextColor(100, 116, 139); // --gray color
            doc.text('Authentic Wholesale Supply', 105, 27, { align: 'center' });
            
            doc.setDrawColor(200, 200, 200);
            doc.line(20, 32, 190, 32);
            
            // Store Information
            doc.setFontSize(10);
            doc.setTextColor(0, 0, 0);
            doc.text(`Order #: ${order.id.slice(-8)}`, 20, 42);
            doc.text(`Store: ${order.store_name}`, 20, 48);
            doc.text(`Business Type: ${order.business_type || 'Spaza Shop'}`, 20, 54);
            doc.text(`Address: ${order.store_address || 'N/A'}`, 20, 60);
            doc.text(`Township: ${order.township || 'N/A'}`, 20, 66);
            doc.text(`Contact: ${order.whatsapp_number || 'N/A'}`, 20, 72);
            doc.text(`Date: ${new Date(order.created_at).toLocaleString()}`, 20, 78);
            doc.text(`Payment: ${order.payment_method || 'Cash'}`, 20, 84);
            doc.text(`Status: ${order.status.toUpperCase()}`, 20, 90);
            
            doc.line(20, 95, 190, 95);
            
            // Items Table
            let yPos = 105;
            doc.setFontSize(9);
            doc.setFont(undefined, 'bold');
            doc.text('Item', 20, yPos);
            doc.text('Qty', 120, yPos);
            doc.text('Price', 140, yPos);
            doc.text('Total', 165, yPos);
            doc.setFont(undefined, 'normal');
            
            yPos += 5;
            doc.line(20, yPos, 190, yPos);
            yPos += 5;
            
            const items = order.items || {};
            let total = 0;
            
            Object.entries(items).forEach(([name, detail]) => {
                if (yPos > 250) {
                    doc.addPage();
                    yPos = 20;
                }
                
                const qty = detail.qty || detail.quantity || 0;
                const price = detail.price || 0;
                const lineTotal = qty * price;
                total += lineTotal;
                
                // Truncate long names
                const shortName = name.length > 30 ? name.substring(0, 27) + '...' : name;
                
                doc.text(shortName, 20, yPos);
                doc.text(qty.toString(), 120, yPos);
                doc.text(`R${price.toFixed(2)}`, 140, yPos);
                doc.text(`R${lineTotal.toFixed(2)}`, 165, yPos);
                
                yPos += 7;
            });
            
            doc.line(20, yPos, 190, yPos);
            yPos += 7;
            
            // Total
            doc.setFont(undefined, 'bold');
            doc.setFontSize(12);
            doc.text(`TOTAL: R${(order.total_amount || total).toFixed(2)}`, 165, yPos, { align: 'right' });
            
            // Footer
            doc.setFont(undefined, 'normal');
            doc.setFontSize(8);
            doc.setTextColor(100, 116, 139);
            doc.text('Thank you for choosing SpazaSure!', 105, 280, { align: 'center' });
            doc.text('Contact: 076 440 3803', 105, 285, { align: 'center' });
            
            // Save the PDF
            doc.save(`SpazaSure_Order_${order.id.slice(-8)}.pdf`);
            
            return true;
        } catch (error) {
            console.error("PDF Generation Error:", error);
            return false;
        }
    }

    // Order placement with all fields
    async function finalPlaceOrder() {
        if (!currentUser) {
            alert("Please login again");
            logout();
            return;
        }

        // Show loading modal
        document.getElementById('modal-loading').classList.remove('hidden');
        document.getElementById('confirm-order-btn').disabled = true;

        try {
            const total = parseFloat(document.getElementById('txt-total').innerText.replace('R ', ''));
            
            if (total <= 0) {
                alert("Your cart is empty");
                hideCheckout();
                document.getElementById('modal-loading').classList.add('hidden');
                document.getElementById('confirm-order-btn').disabled = false;
                return;
            }

            // Format items for storage
            const itemsForDb = {};
            Object.entries(cart).forEach(([name, details]) => {
                itemsForDb[name] = {
                    qty: details.qty,
                    price: details.price,
                    subtotal: details.price * details.qty
                };
            });

            // Prepare order data with all fields
            const orderData = { 
                // Link to profile
                profile_id: currentUser.id,
                
                // Store information from profiles
                store_name: currentUser.store_name,
                store_address: currentUser.address || 'No address provided',
                township: currentUser.township || 'Unknown',
                whatsapp_number: currentUser.whatsapp_number,
                
                // Additional profile info
                business_type: currentUser.business_type || 'Spaza Shop',
                store_size: currentUser.store_size || 'Small/Counter',
                
                // Order details
                total_amount: total, 
                items: itemsForDb, 
                payment_method: selectedPayment, 
                status: 'pending',
                created_at: new Date().toISOString(),
                
                // Verification status at time of order
                is_verified_at_order: currentUser.is_verified || false
            };
            
            console.log("Submitting order with all fields:", orderData);
            
            let result;
            
            if(editingOrderId) {
                result = await _client.from('orders')
                    .update(orderData)
                    .eq('id', editingOrderId)
                    .select();
                editingOrderId = null;
            } else {
                result = await _client.from('orders')
                    .insert([orderData])
                    .select();
            }

            if(result.error) {
                console.error("Supabase error:", result.error);
                
                // Check if it's an RLS error
                if (result.error.message.includes('row-level security') || result.error.code === '42501') {
                    throw new Error("Permission denied. Please contact support or try again.");
                }
                throw new Error(result.error.message);
            }

            const newOrder = result.data[0];
            console.log("Order created successfully:", newOrder);
            
            // Send WhatsApp invoice to admin number
            const whatsappSent = await sendWhatsAppInvoice(newOrder);
            
            // Generate PDF receipt
            const pdfGenerated = await generatePDFReceipt(newOrder);
            
            // Hide loading modal
            document.getElementById('modal-loading').classList.add('hidden');
            document.getElementById('confirm-order-btn').disabled = false;
            
            // Success message
            let successMessage = `✅ Order #${newOrder.id.slice(-8)} created successfully!`;
            if (whatsappSent) successMessage += `\nInvoice sent to SpazaSure admin.`;
            if (pdfGenerated) successMessage += `\nPDF receipt downloaded.`;
            
            alert(successMessage);
            
            // Clear cart and close modal
            cart = {};
            updateTotal();
            hideCheckout();
            
            // Switch to history view
            setMode('history');
            
        } catch (error) {
            console.error("Order error:", error);
            document.getElementById('modal-loading').classList.add('hidden');
            document.getElementById('confirm-order-btn').disabled = false;
            showError('order-error', "❌ Error creating order: " + error.message);
        }
    }

        // Enhanced bulk deals with product schema info

                const savings = ((p.price * 12 - bulkNum) / (p.price * 12) * 100).toFixed(0);

                    price: bulkNum / 12,

                <p><b>Order ID:</b> #${order.id.slice(-8)}</p>
                <p><b>Store:</b> ${order.store_name}</p>
                <p><b>Business Type:</b> ${order.business_type || 'Spaza Shop'}</p>
                <p><b>Store Size:</b> ${order.store_size || 'N/A'}</p>
                <p><b>Address:</b> ${order.store_address || 'N/A'}</p>
                <p><b>Township:</b> ${order.township || 'N/A'}</p>
                <p><b>WhatsApp:</b> ${order.whatsapp_number || 'N/A'}</p>
                <p><b>Date:</b> ${new Date(order.created_at).toLocaleString()}</p>
                <p><b>Payment:</b> ${order.payment_method || 'Cash'}</p>
                <p><b>Status:</b> ${order.status.toUpperCase()}</p>
                <hr>
                <div style="margin:20px 0;">
                    <h4 style="margin-top:0;">Items:</h4>
                    ${itemsList}
                </div>
                <hr>
                <h3 style="text-align:right; margin:15px 0;">Total: R${(order.total_amount || 0).toFixed(2)}</h3>
                <div id="qrcode-container" style="margin:20px 0;">
                    <div id="qrcode"></div>
                </div>
                <button onclick="resendWhatsApp('${order.id}')" class="whatsapp-btn">
                    <i class="fab fa-whatsapp"></i> RESEND TO ADMIN
                </button>
                <button onclick="generatePDFReceipt(${JSON.stringify(order).replace(/'/g, "\\'")})" class="pdf-btn">
                    <i class="fas fa-file-pdf"></i> DOWNLOAD PDF
                </button>
                <button onclick="document.getElementById('modal-order-detail').classList.add('hidden')" style="width:100%; background:#eee; border:none; padding:12px; border-radius:8px; margin-top:10px; cursor:pointer;">Close</button>
            `;
            
            // Generate QR code
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById("qrcode"), { 
                text: `SpazaSure Order:${order.id}\nStore:${order.store_name}\nTotal:R${order.total_amount}`, 
                width: 150, 
                height: 150 
            });
            
            document.getElementById('modal-order-detail').classList.remove('hidden');
        } catch (error) {
            console.error("Error viewing order:", error);
            alert("Error displaying order receipt");
        }
    }

    function editOrder(order) {
        cart = order.items || {};
        editingOrderId = order.id;
        updateTotal();
        setMode('single');
        hideCheckout();
        showCheckout();
    }

    function selectPayment(method) { 
        selectedPayment = method; 
        document.getElementById('pay-cash').style.borderColor = method === 'Cash' ? 'var(--blue)' : '#eee';
        document.getElementById('pay-eft').style.borderColor = method === 'EFT' ? 'var(--blue)' : '#eee';
    }
    
    function showCheckout() { 
        if(Object.keys(cart).length === 0) {
            alert("Your cart is empty. Add some products first.");
            return;
        }
        
        const list = Object.entries(cart).map(([name, details]) => {
            const subtotal = (details.price * details.qty).toFixed(2);
            return `<div class="order-item"><span>${details.qty}x ${name}</span><span>R${subtotal}</span></div>`;
        }).join('');
        
        const total = Object.values(cart).reduce((sum, item) => sum + (item.price * item.qty), 0);
        
        document.getElementById('checkout-list').innerHTML = list + 
            `<div class="total-row">Total: R${total.toFixed(2)}</div>`;
        
        document.getElementById('modal-checkout').classList.remove('hidden'); 
    }
    
    function hideCheckout() { 
        document.getElementById('modal-checkout').classList.add('hidden'); 
        document.getElementById('confirm-order-btn').disabled = false;
        document.getElementById('order-error').classList.add('hidden');
    }

    function logout() { 
        localStorage.clear();
        currentUser = null;
        cart = {};
        location.reload(); 
    }
</script>

</body>
</html>
