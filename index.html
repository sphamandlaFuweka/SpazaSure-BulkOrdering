<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpazaSure | Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .active-tab { border-bottom: 4px solid #16a34a; color: #16a34a; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div id="login-section" class="max-w-md mx-auto pt-20 p-8">
        <div class="bg-white p-8 rounded-3xl shadow-xl border-t-8 border-green-600">
            <h2 class="text-2xl font-bold mb-2 text-center text-gray-800">Store Sign In</h2>
            <p class="text-center text-gray-500 mb-6 text-sm">Access the SpazaSure Marketplace</p>
            
            <label class="text-xs font-bold text-gray-400 uppercase ml-1">WhatsApp Number</label>
            <input type="text" id="login-phone" placeholder="076..." class="w-full p-3 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500">
            
            <label class="text-xs font-bold text-gray-400 uppercase ml-1">Store Name</label>
            <input type="text" id="login-store" placeholder="Exact Store Name" class="w-full p-3 border rounded-xl mb-6 outline-none focus:ring-2 focus:ring-blue-500">
            
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-green-700 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-green-800 transition-all">ENTER MARKET</button>
        </div>
    </div>

    <div id="home-page" class="hidden container mx-auto p-4 max-w-6xl">
        <header class="flex justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-sm border-b-4 border-green-600">
            <div>
                <h1 id="welcome-text" class="text-2xl font-black text-gray-800 italic uppercase">Welcome</h1>
                <p class="text-sm text-gray-500">Official Wholesale Market</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-blue-50 px-4 py-2 rounded-full font-bold text-blue-700">🛒 <span id="cart-count">0</span></div>
                <button onclick="handleLogout()" class="text-xs font-bold bg-red-50 px-3 py-2 rounded-lg text-red-500 hover:bg-red-100 uppercase tracking-tighter">Logout</button>
            </div>
        </header>

        <div class="flex gap-8 mb-8 border-b border-gray-200">
            <button onclick="switchTab('direct')" id="tab-direct" class="pb-4 px-2 font-bold active-tab">Direct Market</button>
            <button onclick="switchTab('bulk')" id="tab-bulk" class="pb-4 px-2 font-bold text-gray-400">Bulk Groups 🚀</button>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <div id="direct-market-view" class="grid grid-cols-2 md:grid-cols-3 gap-6 flex-grow"></div>

            <div id="bulk-groups-view" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6 flex-grow"></div>

            <div class="lg:w-96 bg-white p-6 rounded-3xl shadow-xl h-fit sticky top-8 border border-gray-200">
                <h2 class="text-xl font-bold mb-4">Current Order</h2>
                <div id="cart-items" class="space-y-4 mb-6 max-h-96 overflow-y-auto pr-2"></div>
                <div class="border-t pt-4 space-y-3">
                    <div class="flex justify-between text-2xl font-black text-gray-900 pt-2 border-t">
                        <span>Total</span>
                        <span id="total-cost text-green-600">R 0.00</span>
                    </div>
                </div>
                <button onclick="checkoutWhatsApp()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold mt-8 shadow-lg hover:bg-green-700 transition-all">SEND ORDER</button>
            </div>
        </div>
    </div>

    <script src="bulk-buying.js"></script>
    <script>
        const _supabaseUrl = 'https://clbhfxqxcugxcqutngpo.supabase.co';
        const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsYmhmeHF4Y3VneGNxdXRuZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MzgxMDMsImV4cCI6MjA4NzQxNDEwM30.VWj5TGjAQhj77BZyoSUmynUPDPTVGL_pAKNyrlpQR1Y';
        const _spazaClient = supabase.createClient(_supabaseUrl, _supabaseKey);

        let cart = [];

        async function handleLogin() {
            const phone = document.getElementById('login-phone').value.trim();
            const store = document.getElementById('login-store').value.trim();
            const { data } = await _spazaClient.from('profiles').select('*').eq('whatsapp_number', phone).eq('store_name', store).single();
            if (data) { localStorage.setItem('spaza_user', JSON.stringify(data)); showHomePage(); }
            else { alert("Store details incorrect."); }
        }

        function switchTab(tab) {
            document.getElementById('direct-market-view').classList.toggle('hidden', tab !== 'direct');
            document.getElementById('bulk-groups-view').classList.toggle('hidden', tab !== 'bulk');
            document.getElementById('tab-direct').classList.toggle('active-tab', tab === 'direct');
            document.getElementById('tab-bulk').classList.toggle('active-tab', tab === 'bulk');
            if(tab === 'bulk') loadBulkGroups();
        }

        async function showHomePage() {
            const user = JSON.parse(localStorage.getItem('spaza_user'));
            if (!user) return;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('welcome-text').innerText = "Hello, " + user.store_name;

            const { data: products } = await _spazaClient.from('products').select('*');
            const list = document.getElementById('direct-market-view');
            list.innerHTML = products.map(item => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                    <div class="h-28 bg-gray-50 rounded-xl mb-3 flex items-center justify-center">
                         ${item.image_url ? `<img src="${item.image_url}" class="h-full object-contain" />` : '📦'}
                    </div>
                    <h3 class="font-bold text-gray-800 text-sm">${item.name}</h3>
                    <p class="text-green-700 font-black text-lg">R ${item.price.toFixed(2)}</p>
                    <button onclick="addToCart('${item.name}', ${item.price})" class="w-full bg-blue-600 text-white py-2 rounded-xl mt-4 text-xs font-bold uppercase">Add</button>
                </div>
            `).join('');
            updateCartUI();
        }

        function addToCart(name, price) { cart.push({ name, price }); updateCartUI(); }
        function updateCartUI() {
            const cartDiv = document.getElementById('cart-items');
            const countEl = document.getElementById('cart-count');
            countEl.innerText = cart.length;
            if (cart.length === 0) { cartDiv.innerHTML = `<p class="text-gray-400 text-xs italic text-center">Empty</p>`; return; }
            cartDiv.innerHTML = cart.map((item, i) => `<div class="flex justify-between bg-gray-50 p-2 rounded text-xs font-bold"><span>${item.name}</span><span>R${item.price}</span></div>`).join('');
        }

        function handleLogout() { localStorage.removeItem('spaza_user'); window.location.reload(); }
        window.onload = () => { if(localStorage.getItem('spaza_user')) showHomePage(); };
    </script>
</body>
</html>
