<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpazaSure | Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="login-section" class="max-w-md mx-auto pt-20 p-8">
        <div class="bg-white p-8 rounded-3xl shadow-xl border-t-8 border-green-600">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Store Sign In</h2>
            <input type="text" id="login-phone" placeholder="WhatsApp Number" class="w-full p-3 border rounded-xl mb-4 outline-none">
            <input type="text" id="login-store" placeholder="Store Name" class="w-full p-3 border rounded-xl mb-6 outline-none">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-green-700 text-white py-4 rounded-xl font-bold uppercase">Enter Market</button>
        </div>
    </div>

    <div id="home-page" class="hidden container mx-auto p-4 max-w-6xl">
        <header class="flex justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-sm border-b-4 border-green-600">
            <h1 id="welcome-text" class="text-xl font-black italic uppercase">Welcome</h1>
            <div class="flex items-center gap-4">
                <div class="bg-blue-50 px-4 py-2 rounded-full font-bold text-blue-700">🛒 <span id="cart-count">0</span></div>
                <button onclick="handleLogout()" class="text-xs font-bold text-red-500">LOGOUT</button>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-8">
            <div id="direct-market-view" class="grid grid-cols-2 md:grid-cols-3 gap-6 flex-grow"></div>

            <div class="lg:w-96 bg-white p-6 rounded-3xl shadow-xl h-fit sticky top-8 border border-gray-200">
                <h2 class="text-xl font-bold mb-4 tracking-tight">Your Order</h2>
                <div id="cart-items" class="space-y-4 mb-6 max-h-60 overflow-y-auto pr-2"></div>

                <div class="mt-6 p-4 bg-gray-50 rounded-2xl border border-gray-200">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-3">Select Payment Method</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setPayment('cash')" id="pay-cash" class="border-2 border-green-600 bg-green-50 p-2 rounded-xl text-xs font-bold text-green-700 flex flex-col items-center">
                            <span>💵 Cash</span>
                            <span class="text-[8px] font-normal italic">On Delivery</span>
                        </button>
                        <button class="border-2 border-transparent bg-gray-100 p-2 rounded-xl text-xs font-bold text-gray-400 flex flex-col items-center cursor-not-allowed">
                            <span>💳 Card</span>
                            <span class="text-[8px] font-normal">Coming Soon</span>
                        </button>
                    </div>
                </div>

                <div class="border-t mt-4 pt-4">
                    <div class="flex justify-between text-2xl font-black text-gray-900">
                        <span>Total</span>
                        <span id="total-cost">R 0.00</span>
                    </div>
                </div>

                <button onclick="processOrder()" id="checkout-btn" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold mt-6 shadow-lg hover:bg-green-700 active:scale-95 transition-all">
                    CONFIRM & PLACE ORDER
                </button>
            </div>
        </div>
    </div>

    <script>
        const _supabaseUrl = 'https://clbhfxqxcugxcqutngpo.supabase.co';
        const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsYmhmeHF4Y3VneGNxdXRuZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MzgxMDMsImV4cCI6MjA4NzQxNDEwM30.VWj5TGjAQhj77BZyoSUmynUPDPTVGL_pAKNyrlpQR1Y';
        const _spazaClient = supabase.createClient(_supabaseUrl, _supabaseKey);

        let cart = [];
        let selectedPayment = 'cash';

        async function handleLogin() {
            const phone = document.getElementById('login-phone').value.trim();
            const store = document.getElementById('login-store').value.trim();
            const { data } = await _spazaClient.from('profiles').select('*').eq('whatsapp_number', phone).eq('store_name', store).single();
            if (data) { localStorage.setItem('spaza_user', JSON.stringify(data)); showHomePage(); }
            else { alert("Details not found."); }
        }

        async function showHomePage() {
            const user = JSON.parse(localStorage.getItem('spaza_user'));
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('welcome-text').innerText = "Store: " + user.store_name;

            const { data: products } = await _spazaClient.from('products').select('*');
            const list = document.getElementById('direct-market-view');
            list.innerHTML = products.map(item => `
                <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                    <div class="h-24 bg-gray-50 rounded-xl mb-3 flex items-center justify-center text-3xl">📦</div>
                    <h3 class="font-bold text-gray-800 text-xs">${item.name}</h3>
                    <p class="text-green-700 font-black text-lg">R ${item.price.toFixed(2)}</p>
                    <button onclick="addToCart('${item.name}', ${item.price})" class="w-full bg-blue-600 text-white py-2 rounded-lg mt-2 text-xs font-bold">ADD</button>
                </div>
            `).join('');
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCartUI();
        }

        function updateCartUI() {
            const cartDiv = document.getElementById('cart-items');
            const totalEl = document.getElementById('total-cost');
            const countEl = document.getElementById('cart-count');
            countEl.innerText = cart.length;

            if (cart.length === 0) {
                cartDiv.innerHTML = `<p class="text-gray-400 text-xs italic text-center py-4">Cart is empty</p>`;
                totalEl.innerText = "R 0.00";
                return;
            }

            cartDiv.innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center text-xs bg-gray-50 p-2 rounded-lg">
                    <span class="font-bold">${item.name}</span>
                    <span class="text-green-700">R${item.price}</span>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalEl.innerText = "R " + (total + (total * 0.07)).toFixed(2);
        }

        async function processOrder() {
            if (cart.length === 0) return alert("Add items first!");
            const btn = document.getElementById('checkout-btn');
            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            const user = JSON.parse(localStorage.getItem('spaza_user'));
            const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
            const total = subtotal + (subtotal * 0.07);

            // SAVE TO SUPABASE
            const { data, error } = await _spazaClient.from('orders').insert([{
                profile_id: user.id,
                store_name: user.store_name,
                total_amount: total,
                payment_method: selectedPayment,
                items: cart,
                status: 'pending'
            }]).select();

            if (error) {
                alert("Order Failed: " + error.message);
                btn.innerText = "CONFIRM & PLACE ORDER";
                btn.disabled = false;
                return;
            }

            // SUCCESS
            alert(`✅ SUCCESS!\nOrder for ${user.store_name} placed.\nPayment: CASH ON DELIVERY`);
            
            // WHATSAPP RECEIPT
            const waText = `*ORDER PLACED (CASH)*\nOrder ID: ${data[0].id}\nStore: ${user.store_name}\nTotal: R${total.toFixed(2)}`;
            window.open(`https://wa.me/27764403803?text=${encodeURIComponent(waText)}`, '_blank');

            cart = [];
            updateCartUI();
            btn.innerText = "CONFIRM & PLACE ORDER";
            btn.disabled = false;
        }

        function handleLogout() { localStorage.removeItem('spaza_user'); location.reload(); }
        window.onload = () => { if(localStorage.getItem('spaza_user')) showHomePage(); };
    </script>
</body>
</html>
