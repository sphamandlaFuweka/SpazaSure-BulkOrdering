<script>
    const _supabaseUrl = 'https://clbhfxqxcugxcqutngpo.supabase.co';
    const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsYmhmeHF4Y3VneGNxdXRuZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MzgxMDMsImV4cCI6MjA4NzQxNDEwM30.VWj5TGjAQhj77BZyoSUmynUPDPTVGL_pAKNyrlpQR1Y';
    const _client = supabase.createClient(_supabaseUrl, _supabaseKey, { auth: { persistSession: false } });

    let cart = {}; 
    let products = [];
    let buyingGroups = [];
    let currentMode = 'single';

    // --- AUTH ---
    async function handleLogin() {
        const phone = document.getElementById('login-phone').value.trim();
        const store = document.getElementById('login-store').value.trim();
        const { data } = await _client.from('profiles').select('*').eq('whatsapp_number', phone).ilike('store_name', store).single();
        if (data) { 
            localStorage.setItem('spaza_user', JSON.stringify(data)); 
            location.reload(); 
        } else { 
            alert("Store not found!"); 
        }
    }

    window.onload = async () => {
        const user = localStorage.getItem('spaza_user');
        if (user) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
            await loadData();
        }
    };

    async function loadData() {
        const { data: pData } = await _client.from('products').select('*');
        const { data: gData } = await _client.from('buying_groups').select('*');
        products = pData || [];
        buyingGroups = gData || [];
        renderView();
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('tab-single').classList.toggle('active', mode === 'single');
        document.getElementById('tab-bulk').classList.toggle('active', mode === 'bulk');
        document.getElementById('mode-title').innerText = mode === 'single' ? "Single Units" : "Active Buying Groups";
        renderView();
    }

    // --- RENDER WITH SAFETY CHECKS ---
    function renderView() {
        const list = document.getElementById('main-list');
        const term = document.getElementById('product-search').value.toLowerCase();

        if (currentMode === 'single') {
            const filtered = products.filter(p => (p.name || "").toLowerCase().includes(term));
            list.innerHTML = filtered.map(p => {
                // SAFETY: Convert price to number or use 0 if undefined
                const rawPrice = Number(p.price) || 0;
                const finalPrice = rawPrice * 1.07;
                
                return `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <b style="text-transform:uppercase;">${p.name || 'Unknown Item'}</b><br>
                        <span style="color:var(--blue); font-weight:bold;">R ${finalPrice.toFixed(2)}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <input type="number" id="qty-${p.id}" value="1" min="1" style="width:50px; margin:0; padding:5px; text-align:center;">
                        <button class="add-btn" data-id="${p.id}" data-name="${p.name}" data-price="${finalPrice}">ADD</button>
                    </div>
                </div>`;
            }).join('');
        } else {
            list.innerHTML = buyingGroups.map(g => {
                // SAFETY: Convert price and quantities to numbers
                const rawPrice = Number(g.unit_price) || 0;
                const finalPrice = rawPrice * 1.07;
                const currentQty = Number(g.current_quantity) || 0;
                const targetQty = Number(g.target_quantity) || 1; // Avoid division by zero
                const progress = Math.min((currentQty / targetQty) * 100, 100);

                return `
                <div class="card group-card">
                    <b style="text-transform:uppercase;">${g.name || 'Group Deal'}</b>
                    <p style="font-size:12px; color:#666; margin:4px 0;">${g.description || ''}</p>
                    <div style="font-size:18px; font-weight:900; color:var(--green);">R ${finalPrice.toFixed(2)}</div>
                    
                    <div class="progress-container">
                        <div class="progress-fill" style="width:${progress}%"></div>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:bold;">
                        <span>${currentQty} JOINED</span>
                        <span>GOAL: ${targetQty}</span>
                    </div>
                    
                    <div style="display:flex; gap:10px; margin-top:12px;">
                         <input type="number" id="qty-${g.id}" value="1" min="1" style="width:60px; margin:0; padding:5px; text-align:center;">
                         <button class="add-btn group-btn" data-id="${g.id}" data-name="[GROUP] ${g.name}" data-price="${finalPrice}">JOIN GROUP</button>
                    </div>
                </div>`;
            }).join('');
        }
    }

    // --- BULLETPROOF MATH ---
    document.body.addEventListener('click', function(e) {
        if (e.target.classList.contains('add-btn')) {
            const id = e.target.getAttribute('data-id');
            const name = e.target.getAttribute('data-name') || "Item";
            const price = Number(e.target.getAttribute('data-price')) || 0;
            const qtyInput = document.getElementById(`qty-${id}`);
            const qty = parseInt(qtyInput.value) || 0;

            if (qty > 0) {
                if (cart[name]) {
                    cart[name].qty += qty;
                } else {
                    cart[name] = { price: price, qty: qty };
                }
                updateUI();
                qtyInput.value = 1;
                e.target.innerText = "✓";
                setTimeout(() => { 
                    e.target.innerText = name.includes('[GROUP]') ? "JOIN GROUP" : "ADD"; 
                }, 800);
            }
        }
    });

    function updateUI() {
        let total = 0, count = 0;
        for (let k in cart) { 
            const itemPrice = Number(cart[k].price) || 0;
            const itemQty = Number(cart[k].qty) || 0;
            total += itemPrice * itemQty; 
            count += itemQty; 
        }
        document.getElementById('total-cost').innerText = "R " + total.toFixed(2);
        document.getElementById('cart-count').innerText = count + " Items";
    }

    function toggleAdmin() {
        const panel = document.getElementById('admin-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    async function createGroup() {
        const name = document.getElementById('adm-name').value;
        const desc = document.getElementById('adm-desc').value;
        const target = Number(document.getElementById('adm-target').value);
        const price = Number(document.getElementById('adm-price').value);

        if(!name || target <= 0 || price <= 0) return alert("Please enter valid details");

        const { error } = await _client.from('buying_groups').insert([{
            name, description: desc, target_quantity: target, unit_price: price
        }]);

        if (error) alert(error.message);
        else { alert("Group Launched!"); location.reload(); }
    }

    async function processOrder() {
        const user = JSON.parse(localStorage.getItem('spaza_user')) || { store_name: "Guest" };
        if (Object.keys(cart).length === 0) return alert("Cart is empty!");

        let msg = `*ORDER FROM: ${user.store_name}*%0A%0A`;
        let total = 0;
        for (let k in cart) {
            const sub = cart[k].price * cart[k].qty;
            msg += `• ${k} x${cart[k].qty} = R${sub.toFixed(2)}%0A`;
            total += sub;
        }
        msg += `%0A*GRAND TOTAL: R${total.toFixed(2)}*`;
        window.location.href = `https://wa.me/27764403803?text=${msg}`;
    }
</script>
