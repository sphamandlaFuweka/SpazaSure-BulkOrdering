<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpazaSure | Premium Wholesale</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Keeta Modern UI - Clean & Professional */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --primary: #1E3A8A;      /* Deep navy blue */
            --primary-light: #3B82F6;
            --secondary: #10B981;     /* Mint green */
            --accent: #F59E0B;        /* Warm amber */
            --danger: #EF4444;
            --dark: #0F172A;
            --gray-800: #1E293B;
            --gray-600: #475569;
            --gray-400: #94A3B8;
            --gray-200: #E2E8F0;
            --gray-100: #F8FAFC;
            --white: #FFFFFF;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.03);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
        }

        body {
            background: var(--gray-100);
            color: var(--dark);
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--white);
            position: relative;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
        }

        /* Splash Screen */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeOut 0.4s ease 1.2s forwards;
        }

        .splash-content {
            text-align: center;
            color: white;
        }

        .splash-logo {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }

        .splash-logo span {
            color: var(--secondary);
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* Landing Page */
        .landing-screen {
            min-height: 100vh;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .landing-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: 40px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.4s ease;
        }

        .landing-logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            text-align: center;
        }

        .landing-logo span {
            color: var(--secondary);
        }

        .landing-tagline {
            color: var(--gray-600);
            text-align: center;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .user-type-btn {
            width: 100%;
            padding: 20px;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .user-type-btn:hover {
            border-color: var(--primary);
            background: var(--gray-100);
        }

        .user-type-icon {
            width: 48px;
            height: 48px;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .user-type-info h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .user-type-info p {
            font-size: 0.8rem;
            color: var(--gray-600);
        }

        /* Auth Card */
        .auth-screen {
            min-height: 100vh;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.4s ease;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--gray-600);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 24px;
            padding: 0;
        }

        .back-btn:hover {
            color: var(--primary);
        }

        .auth-header {
            margin-bottom: 32px;
        }

        .auth-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--gray-600);
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gray-600);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: all 0.2s ease;
            background: var(--white);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .btn-secondary {
            background: var(--gray-100);
            color: var(--dark);
        }

        .btn-secondary:hover {
            background: var(--gray-200);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--gray-600);
            font-size: 0.9rem;
        }

        .auth-link {
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
        }

        /* Main Header - Keeta Style */
        .app-header {
            background: white;
            padding: 20px 16px 12px;
            border-bottom: 1px solid var(--gray-200);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .store-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .store-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
        }

        .store-details {
            line-height: 1.4;
        }

        .user-name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--dark);
        }

        .user-badge {
            font-size: 0.7rem;
            color: var(--gray-600);
            background: var(--gray-100);
            padding: 2px 8px;
            border-radius: 30px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            background: var(--gray-100);
            border: none;
            border-radius: var(--radius-md);
            color: var(--dark);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: var(--gray-200);
        }

        .welcome-message {
            margin-bottom: 16px;
        }

        .welcome-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--dark);
        }

        .welcome-subtitle {
            font-size: 0.9rem;
            color: var(--gray-600);
        }

        .search-box {
            background: var(--gray-100);
            border-radius: var(--radius-lg);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--gray-200);
        }

        .search-box i {
            color: var(--gray-400);
            font-size: 1.1rem;
        }

        .search-box input {
            background: transparent;
            border: none;
            width: 100%;
            font-size: 0.95rem;
        }

        .search-box input::placeholder {
            color: var(--gray-400);
        }

        /* Categories */
        .categories-strip {
            padding: 16px;
            background: white;
            border-bottom: 1px solid var(--gray-200);
        }

        .categories-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .categories-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            padding: 8px 16px;
            background: var(--gray-100);
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--gray-600);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--gray-200);
        }

        .category-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Products Grid - Keeta Style */
        .products-grid {
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .product-card {
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--gray-200);
            transition: all 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .product-image {
            position: relative;
            padding-top: 100%;
            background: var(--gray-100);
        }

        .product-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-badges {
            position: absolute;
            top: 8px;
            left: 8px;
            display: flex;
            gap: 4px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .badge-verified {
            background: var(--secondary);
            color: white;
        }

        .badge-customer {
            background: var(--accent);
            color: white;
        }

        .badge-spaza {
            background: var(--primary);
            color: white;
        }

        .product-info {
            padding: 12px;
        }

        .product-category {
            font-size: 0.65rem;
            color: var(--gray-600);
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }

        .product-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            line-height: 1.3;
            height: 2.4rem;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            color: var(--dark);
        }

        .product-price {
            display: flex;
            align-items: baseline;
            gap: 6px;
            margin-bottom: 12px;
        }

        .current-price {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .product-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            background: var(--gray-100);
            border-radius: 30px;
            padding: 2px;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: white;
            border-radius: 30px;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            font-size: 1rem;
        }

        .qty-btn:hover {
            background: var(--primary);
            color: white;
        }

        .qty-value {
            min-width: 28px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .add-to-cart {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--primary);
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        .add-to-cart:hover {
            background: var(--primary-light);
            transform: scale(1.05);
        }

        /* Floating Cart - Keeta Style */
        .floating-cart {
            position: fixed;
            bottom: 90px;
            left: 16px;
            right: 16px;
            max-width: 448px;
            margin: 0 auto;
            background: white;
            border-radius: var(--radius-xl);
            padding: 14px 20px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 950;
            border: 1px solid var(--gray-200);
        }

        .cart-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cart-icon {
            position: relative;
        }

        .cart-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--accent);
            color: white;
            font-size: 0.65rem;
            font-weight: 600;
            width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-total-label {
            font-size: 0.7rem;
            color: var(--gray-600);
        }

        .cart-total-value {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--dark);
        }

        .checkout-btn {
            padding: 10px 24px;
            background: var(--primary);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .checkout-btn:hover {
            background: var(--primary-light);
        }

        /* Bottom Navigation - Keeta Style */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 16px;
            border-top: 1px solid var(--gray-200);
            box-shadow: 0 -4px 10px rgba(0,0,0,0.02);
            z-index: 900;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 30px;
            transition: all 0.2s ease;
            color: var(--gray-600);
        }

        .nav-item i {
            font-size: 1.3rem;
        }

        .nav-item span {
            font-size: 0.7rem;
            font-weight: 500;
        }

        .nav-item.active {
            color: var(--primary);
        }

        /* Buying Groups */
        .groups-grid {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .group-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px;
            border: 1px solid var(--gray-200);
            transition: all 0.2s ease;
        }

        .group-card:hover {
            box-shadow: var(--shadow);
        }

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .group-title {
            font-weight: 700;
            font-size: 1rem;
        }

        .group-status {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            background: #e6f7f0;
            color: var(--secondary);
        }

        .group-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 12px 0;
        }

        .group-stat {
            text-align: center;
            padding: 10px;
            background: var(--gray-100);
            border-radius: var(--radius-md);
        }

        .group-stat-value {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .group-stat-label {
            font-size: 0.65rem;
            color: var(--gray-600);
            text-transform: uppercase;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--gray-200);
            border-radius: 3px;
            overflow: hidden;
            margin: 12px 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .group-actions {
            display: flex;
            gap: 8px;
        }

        .btn-join, .btn-invite {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .btn-join {
            background: var(--primary);
            color: white;
        }

        .btn-invite {
            background: var(--gray-100);
            color: var(--dark);
        }

        /* Order History */
        .orders-list {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .order-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px;
            border: 1px solid var(--gray-200);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .order-id {
            font-weight: 600;
            color: var(--primary);
            font-size: 0.9rem;
        }

        .order-status {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-completed {
            background: #e6f7f0;
            color: var(--secondary);
        }

        .order-total {
            font-weight: 700;
            font-size: 1.2rem;
            margin: 8px 0;
        }

        .order-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }

        .order-btn {
            padding: 10px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .btn-view {
            background: var(--gray-100);
            color: var(--primary);
        }

        .btn-pdf {
            background: var(--gray-100);
            color: var(--accent);
        }

        /* Scanner */
        .scanner-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .scanner-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            color: white;
            position: absolute;
            top: 0;
        }

        .scanner-close {
            background: rgba(255,255,255,0.2);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        #scanner-viewport {
            width: 100%;
            max-width: 400px;
            height: 280px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: relative;
        }

        .scanner-result {
            background: white;
            padding: 20px;
            border-radius: var(--radius-lg);
            margin-top: 20px;
            width: 90%;
            max-width: 400px;
        }

        /* Chatbot - Keeta Style */
        .chatbot-toggle {
            position: fixed;
            bottom: 160px;
            right: 16px;
            width: 56px;
            height: 56px;
            background: var(--primary);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            z-index: 1999;
            border: none;
        }

        .chatbot-container {
            position: fixed;
            bottom: 160px;
            right: 16px;
            width: 320px;
            height: 480px;
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            z-index: 2000;
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }

        .chatbot-header {
            background: var(--primary);
            color: white;
