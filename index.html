<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpazaSure | Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="login-section" class="max-w-md mx-auto pt-20 p-8">
        <div class="bg-white p-8 rounded-3xl shadow-xl border-t-8 border-green-600">
            <h2 class="text-2xl font-bold mb-2 text-center text-gray-800">Store Sign In</h2>
            <p class="text-center text-gray-500 mb-6 text-sm">Access the SpazaSure Marketplace</p>
            
            <label class="text-xs font-bold text-gray-400 uppercase ml-1">WhatsApp Number</label>
            <input type="text" id="login-phone" placeholder="0764403803" class="w-full p-3 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500">
            
            <label class="text-xs font-bold text-gray-400 uppercase ml-1">Store Name</label>
            <input type="text" id="login-store" placeholder="Exact Store Name" class="w-full p-3 border rounded-xl mb-6 outline-none focus:ring-2 focus:ring-blue-500">
            
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-green-700 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-green-800 transition-all">
                ENTER MARKET
            </button>
            
            <p class="text-center mt-6 text-sm">New store? <a href="register.html" class="text-blue-600 font-bold underline">Register here</a></p>
        </div>
    </div>

    <div id="home-page" class="hidden container mx-auto p-4 max-w-6xl">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border-b-4 border-green-600">
            <div>
                <h1 id="welcome-text" class="text-2xl font-black text-gray-800 italic">Welcome!</h1>
                <p class="text-sm text-gray-500">Official Wholesale Market</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-blue-50 px-4 py-2 rounded-full font-bold text-blue-700">🛒 <span id="cart-count">0</span> Items</div>
                <button onclick="handleLogout()" class="text-xs font-bold bg-red-50 px-3 py-2 rounded-lg text-red-500 hover:bg-red-100">LOGOUT</button>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-8">
            <div id="product-list" class="grid grid-cols-2 md:grid-cols-3 gap-6 flex-grow">
                </div>

            <div class="lg:w-96 bg-white p-6 rounded-3xl shadow-xl h-fit sticky top-8 border border-gray-200">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <span>Your Order</span>
                </h2>
                
                <div id="cart-items" class="space-y-4 mb-6 max-h-96 overflow-y-auto pr-2">
                    <p class="text-gray-400 text-sm italic text-center py-10">Your cart is empty. Start shopping!</p>
                </div>

                <div class="border-t pt-4 space-y-3">
                    <div class="flex justify-between text-gray-600">
                        <span>Subtotal</span>
                        <span id="subtotal" class="font-medium">R 0.00</span>
                    </div>
                    <div class="flex justify-between text-blue-600">
                        <span>Service Fee (7%)</span>
                        <span id="service-fee" class="font-medium">R 0.00</span>
                    </div>
                    <div class="flex justify-between text-2xl font-black text-gray-900 pt-2 border-t">
                        <span>Total</span>
                        <span id="total-cost">R 0.00</span>
                    </div>
                </div>

                <button onclick="checkoutWhatsApp()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold mt-8 shadow-lg hover:bg-green-700 active:scale-95 transition-all flex justify-center items-center gap-2">
                    SEND ORDER TO WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <script>
        const _supabaseUrl = 'https://clbhfxqxcugxcqutngpo.supabase.co';
        const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsYmhmeHF4Y3VneGNxdXRuZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MzgxMDMsImV4cCI6MjA4NzQxNDEwM30.VWj5TGjAQhj77BZyoSUmynUPDPTVGL_pAKNyrlpQR1Y';
        const _spazaClient = supabase.createClient(_supabaseUrl, _supabaseKey);

        let cart = [];

        async function handleLogin() {
            const phone = document.getElementById('login-phone').value.trim();
            const store = document.getElementById('login-store').value.trim();
            const btn = document.getElementById('loginBtn');
            
            if (!phone || !store) return alert("Please enter both fields.");
            btn.innerText = "Connecting...";

            const { data, error } = await _spazaClient
                .from('profiles')
                .select('*')
                .eq('whatsapp_number', phone)
                .eq('store_name', store)
                .single();

            if (data) {
                localStorage.setItem('spaza_user', JSON.stringify(data));
                showHomePage(); 
            } else {
                alert("Store not found. Check your details.");
                btn.innerText = "ENTER MARKET";
            }
        }

        async function showHomePage() {
            const user = JSON.parse(localStorage.getItem('spaza_user'));
            if (!user) return;

            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('welcome-text').innerText = "Hello, " + user.store_name;

            const { data: products } = await _spazaClient.from('products').select('*');
            const list = document.getElementById('product-list');
            
            list.innerHTML = products.map(item => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between">
                    <div>
                        <div class="h-24 bg-gray-50 rounded-xl mb-3 flex items-center justify-center text-4xl">📦</div>
                        <h3 class="font-bold text-gray-800">${item.name}</h3>
                        <p class="text-green-700 font-black text-xl">R ${item.price.toFixed(2)}</p>
                    </div>
                    <button onclick="addToCart('${item.name}', ${item.price})" 
                        class="w-full bg-blue-600 text-white py-2 rounded-xl mt-4 text-sm font-bold shadow-md hover:bg-blue-700 active:scale-95 transition-all">
                        ADD TO ORDER
                    </button>
                </div>
            `).join('');
            updateCartUI();
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCartUI();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            const cartDiv = document.getElementById('cart-items');
            const subtotalEl = document.getElementById('subtotal');
            const feeEl = document.getElementById('service-fee');
            const totalEl = document.getElementById('total-cost');
            const countEl = document.getElementById('cart-count');

            countEl.innerText = cart.length;

            if (cart.length === 0) {
                cartDiv.innerHTML = `<p class="text-gray-400 text-sm italic text-center py-10">Your cart is empty.</p>`;
                subtotalEl.innerText = "R 0.00";
                feeEl.innerText = "R 0.00";
                totalEl.innerText = "R 0.00";
                return;
            }

            cartDiv.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <div>
                        <p class="font-bold text-gray-800 text-sm">${item.name}</p>
                        <p class="text-xs text-gray-500 font-medium">R ${item.price.toFixed(2)}</p>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-red-400 hover:text-red-600 p-1 text-lg">✕</button>
                </div>
            `).join('');

            const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
            const fee = subtotal * 0.07;
            const total = subtotal + fee;

            subtotalEl.innerText = "R " + subtotal.toFixed(2);
            feeEl.innerText = "R " + fee.toFixed(2);
            totalEl.innerText = "R " + total.toFixed(2);
        }

        function checkoutWhatsApp() {
            if (cart.length === 0) return alert("Please add items to your cart first.");
            
            const user = JSON.parse(localStorage.getItem('spaza_user'));
            const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
            const fee = subtotal * 0.07;
            const total = subtotal + fee;

            let text = `*NEW ORDER: ${user.store_name}*\n`;
            text += `--------------------------\n`;
            cart.forEach(item => {
                text += `✅ ${item.name} - R${item.price.toFixed(2)}\n`;
            });
            text += `--------------------------\n`;
            text += `*Subtotal:* R${subtotal.toFixed(2)}\n`;
            text += `*Service Fee (7%):* R${fee.toFixed(2)}\n`;
            text += `*TOTAL AMOUNT: R${total.toFixed(2)}*\n\n`;
            text += `📍 *Delivery Address:* ${user.address}\n`;
            text += `📞 *Contact:* ${user.whatsapp_number}`;

            const encodedText = encodeURIComponent(text);
            window.open(`https://wa.me/27764403803?text=${encodedText}`, '_blank');
        }

        function handleLogout() {
            localStorage.removeItem('spaza_user');
            window.location.reload();
        }

        window.onload = () => {
            if(localStorage.getItem('spaza_user')) showHomePage();
        };
    </script>
</body>
</html>
