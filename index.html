<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpazaSure - Premium Wholesale</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --secondary: #10b981;
            --accent: #8b5cf6;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1e293b;
            --gray-800: #334155;
            --gray-600: #64748b;
            --gray-400: #94a3b8;
            --gray-200: #e2e8f0;
            --gray-100: #f1f5f9;
            --white: #ffffff;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        body {
            background: var(--gray-100);
            color: var(--dark);
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--white);
            position: relative;
            box-shadow: var(--shadow-xl);
        }

        /* Splash Screen */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeOut 0.5s ease 2s forwards;
        }

        .splash-content {
            text-align: center;
            color: var(--white);
        }

        .splash-logo {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }

        .splash-tagline {
            font-size: 1rem;
            opacity: 0.9;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* Auth Screens */
        .auth-screen {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: var(--white);
            border-radius: 32px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-xl);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: var(--gray-600);
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--white);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .input-field.error {
            border-color: var(--danger);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: var(--white);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        .btn-secondary {
            background: var(--gray-200);
            color: var(--gray-800);
        }

        .btn-secondary:hover {
            background: var(--gray-400);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--gray-600);
            font-size: 0.9rem;
        }

        .auth-link {
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        /* Main App Header */
        .app-header {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: var(--white);
            padding: 20px;
            border-radius: 0 0 30px 30px;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .store-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .store-avatar {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            backdrop-filter: blur(5px);
        }

        .store-details {
            line-height: 1.3;
        }

        .store-name {
            font-weight: 700;
            font-size: 1rem;
        }

        .store-badge {
            font-size: 0.7rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: var(--white);
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .welcome-message {
            margin-bottom: 16px;
        }

        .welcome-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .welcome-subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .search-box i {
            color: var(--white);
            opacity: 0.8;
        }

        .search-box input {
            background: transparent;
            border: none;
            width: 100%;
            color: var(--white);
            font-size: 0.95rem;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-box input:focus {
            outline: none;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            padding: 16px 20px;
            gap: 12px;
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            position: sticky;
            top: 140px;
            z-index: 99;
        }

        .nav-tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--gray-100);
            color: var(--gray-600);
        }

        .nav-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: var(--white);
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }

        .nav-tab i {
            margin-right: 6px;
        }

        /* Categories Strip */
        .categories-strip {
            padding: 16px 20px;
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
        }

        .categories-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .categories-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            padding: 8px 20px;
            background: var(--gray-100);
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gray-600);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--gray-200);
        }

        .category-chip:hover,
        .category-chip.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }

        /* Products Grid */
        .products-grid {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding-bottom: 100px;
        }

        .product-card {
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            border: 1px solid var(--gray-200);
            animation: fadeIn 0.5s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .product-image {
            position: relative;
            padding-top: 100%;
            background: var(--gray-100);
        }

        .product-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-image img {
            transform: scale(1.05);
        }

        .product-badges {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            z-index: 2;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-verified {
            background: var(--secondary);
            color: var(--white);
        }

        .badge-stock {
            background: var(--danger);
            color: var(--white);
        }

        .badge-sale {
            background: var(--warning);
            color: var(--white);
        }

        .product-info {
            padding: 16px;
        }

        .product-category {
            font-size: 0.65rem;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .product-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: var(--dark);
            line-height: 1.3;
        }

        .product-price {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 12px;
        }

        .current-price {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .old-price {
            font-size: 0.8rem;
            color: var(--gray-400);
            text-decoration: line-through;
        }

        .product-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            background: var(--gray-100);
            border-radius: 30px;
            padding: 4px;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            border: none;
            background: var(--white);
            border-radius: 30px;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .qty-btn:hover {
            background: var(--primary);
            color: var(--white);
        }

        .qty-value {
            min-width: 30px;
            text-align: center;
            font-weight: 700;
        }

        .add-to-cart {
            width: 36px;
            height: 36px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 30px;
            color: var(--white);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }

        .add-to-cart:hover {
            transform: scale(1.1);
        }

        /* Floating Cart */
        .floating-cart {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 440px;
            background: var(--white);
            border-radius: 30px;
            padding: 16px 20px;
            box-shadow: var(--shadow-xl);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            border: 1px solid var(--gray-200);
            animation: slideUp 0.3s ease;
        }

        .cart-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cart-icon {
            position: relative;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: var(--white);
            font-size: 0.7rem;
            font-weight: 700;
            width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-total-label {
            font-size: 0.75rem;
            color: var(--gray-600);
        }

        .cart-total-value {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--dark);
        }

        .checkout-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 30px;
            color: var(--white);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        /* Order History */
        .orders-list {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 100px;
        }

        .order-card {
            background: var(--white);
            border-radius: 24px;
            padding: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
            transition: all 0.3s ease;
        }

        .order-card:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow-lg);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .order-id {
            font-weight: 700;
            color: var(--primary);
            font-size: 0.9rem;
        }

        .order-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .order-date {
            font-size: 0.8rem;
            color: var(--gray-600);
            margin-bottom: 8px;
        }

        .order-total {
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--dark);
            margin-bottom: 12px;
        }

        .order-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .order-btn {
            padding: 10px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-view {
            background: var(--primary);
            color: var(--white);
        }

        .btn-pdf {
            background: var(--danger);
            color: var(--white);
        }

        .btn-edit {
            background: var(--gray-200);
            color: var(--dark);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: var(--white);
            border-radius: 32px;
            width: 100%;
            max-width: 440px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
            box-shadow: var(--shadow-xl);
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--dark);
        }

        .modal-close {
            background: var(--gray-100);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: var(--gray-200);
        }

        /* Receipt */
        .receipt {
            background: var(--white);
        }

        .receipt-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .receipt-logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .receipt-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            margin: 20px 0;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .receipt-items {
            margin: 20px 0;
        }

        .receipt-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed var(--gray-200);
        }

        .receipt-total {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary);
            text-align: right;
            margin: 20px 0;
        }

        .qr-code {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .hidden {
            display: none !important;
        }

        /* Loading Spinner */
        .loading-spinner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Animations */
        .pulse-animation {
            animation: pulse 2s infinite;
        }

        .slide-in {
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <!-- Splash Screen -->
        <div class="splash-screen" id="splashScreen">
            <div class="splash-content">
                <div class="splash-logo">SPAZASURE</div>
                <div class="splash-tagline">Premium Wholesale Supply</div>
            </div>
        </div>

        <!-- Auth Section -->
        <div id="authSection" class="auth-screen">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">SPAZASURE</div>
                    <div class="auth-subtitle">Sign in to your store</div>
                </div>

                <!-- Login Form -->
                <div id="loginForm">
                    <div class="input-group">
                        <label class="input-label">WhatsApp Number</label>
                        <input type="tel" id="login-wa" class="input-field" placeholder="e.g. 27821234567">
                    </div>
                    <button class="btn btn-primary" onclick="handleLogin()">
                        <i class="fas fa-sign-in-alt"></i>
                        Sign In
                    </button>
                    <div id="login-error" class="error-message" style="color: var(--danger); text-align: center; margin-top: 12px;"></div>
                    <div class="auth-footer">
                        New store? <span class="auth-link" onclick="toggleAuth(true)">Register here</span>
                    </div>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="hidden">
                    <div class="input-group">
                        <label class="input-label">First Name</label>
                        <input type="text" id="reg-fname" class="input-field">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Last Name</label>
                        <input type="text" id="reg-lname" class="input-field">
                    </div>

    <script>
        // CONFIGURATION
        const _supabaseUrl = 'https://clbhfxqxcugxcqutngpo.supabase.co';
        const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsYmhmeHF4Y3VneGNxdXRuZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MzgxMDMsImV4cCI6MjA4NzQxNDEwM30.VWj5TGjAQhj77BZyoSUmynUPDPTVGL_pAKNyrlpQR1Y';
        const _client = supabase.createClient(_supabaseUrl, _supabaseKey);
        const ADMIN_WHATSAPP = '27764403803';

        // State
        let cart = {};
        let products = [];
        let currentMode = 'single';
        let selectedPayment = 'Cash';
        let editingOrderId = null;
        let currentUser = null;
        let selectedCategory = 'all';
        let imageFileMap = new Map();
        const imageUrlCache = new Map();

        // Hide splash screen after 2 seconds
        setTimeout(() => {
            document.getElementById('splashScreen').style.display = 'none';
        }, 2000);

        // Check for existing session
        window.onload = async () => {
            if (localStorage.getItem('spaza_user')) {
                currentUser = JSON.parse(localStorage.getItem('spaza_user'));
                await initApp();
            }

        // Toggle between login and register
        function toggleAuth(showReg) {
            document.getElementById('loginForm').classList.toggle('hidden', showReg);
            document.getElementById('registerForm').classList.toggle('hidden', !showReg);
        }

        // Handle login
        async function handleLogin() {
            const wa = document.getElementById('login-wa').value.trim();
            if (!wa) {
                showError('login-error', 'Please enter your WhatsApp number');
                return;
            }

            showLoading(true);
            const { data, error } = await _client.from('profiles').select('*').eq('whatsapp_number', wa).maybeSingle();
            showLoading(false);

            if (error) {
                showError('login-error', 'Error logging in. Please try again.');
                console.error(error);
            } else if (data) {
                await loginSuccess(data);
            } else {
                showError('login-error', 'Store not found. Please register.');
            }
        }

        // Handle register
        async function handleRegister() {
            const payload = {
                first_name: document.getElementById('reg-fname').value,
                last_name: document.getElementById('reg-lname').value,
                store_name: document.getElementById('reg-sname').value,
                whatsapp_number: parseInt(document.getElementById('reg-wa').value),
                business_type: document.getElementById('reg-bus-type').value,
                store_size: document.getElementById('reg-size').value,
                township: document.getElementById('reg-town').value,
                address: document.getElementById('reg-address').value,
                gender: document.getElementById('reg-gender').value,
                role: 'spaza',
                is_verified: false
            };

            // Validate
            for (let [key, value] of Object.entries(payload)) {
                if (!value && key !== 'role' && key !== 'is_verified') {
                    showError('register-error', `Please fill in ${key.replace('_', ' ')}`);
                    return;
                }
            }

            showLoading(true);
            const { data, error } = await _client.from('profiles').insert([payload]).select().single();
            showLoading(false);

            if (error) {
                showError('register-error', 'Error: ' + error.message);
            } else {
                await loginSuccess(data);
            }
        }

        // Login success
        async function loginSuccess(user) {
            currentUser = user;
            localStorage.setItem('spaza_user', JSON.stringify(user));
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            
            // Update welcome message
            const hour = new Date().getHours();
            const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
            document.getElementById('welcome-message').textContent = `${greeting}, ${user.first_name || 'Store Owner'}!`;
            
            document.getElementById('txt-store-name').textContent = user.store_name;
            document.getElementById('txt-badge').textContent = user.is_verified ? 'VERIFIED' : 'PENDING';
            document.getElementById('txt-badge').style.background = user.is_verified ? 'var(--secondary)' : 'var(--warning)';
            
            await loadImageMap();
            await loadContent();
        }

        // Load image map
        async function loadImageMap() {
            try {
                const { data: files, error } = await _client.storage.from('Images').list();
                if (error) throw error;
                
                files.forEach(file => {
                    const fileName = file.name;
                    const baseName = fileName.replace(/\.[^/.]+$/, '').toLowerCase();
                    const cleanName = baseName.replace(/[^a-z0-9]/g, '');
                    imageFileMap.set(baseName, fileName);
                    imageFileMap.set(cleanName, fileName);
                });
            } catch (error) {
                console.error('Error loading images:', error);
            }
        }

        // Get image URL
        function getImageUrl(productName) {
            if (imageUrlCache.has(productName)) {
                return imageUrlCache.get(productName);
            }

            const baseUrl = 'https://clbhfxqxcugxcqutngpo.supabase.co/storage/v1/object/public/Images/';
            const normalizedName = productName.toLowerCase();
            const cleanName = normalizedName.replace(/[^a-z0-9]/g, '');

            let matchedFile = null;
            if (imageFileMap.has(normalizedName)) {
                matchedFile = imageFileMap.get(normalizedName);
            } else if (imageFileMap.has(cleanName)) {
                matchedFile = imageFileMap.get(cleanName);
            } else {
                for (let [key, filename] of imageFileMap.entries()) {
                    if (normalizedName.includes(key) || key.includes(normalizedName) || 
                        cleanName.includes(key) || key.includes(cleanName)) {
                        matchedFile = filename;
                        break;
                    }
                }
            }

            const url = matchedFile 
                ? baseUrl + encodeURIComponent(matchedFile)
                : `https://via.placeholder.com/300/2563eb/ffffff?text=${encodeURIComponent(productName.substring(0, 20))}`;
            
            imageUrlCache.set(productName, url);
            return url;
        }

        // Load content
        async function loadContent() {
            try {
                const { data: p, error } = await _client.from('products').select('*');
                if (error) throw error;
                products = p && p.length > 0 ? p : [];
                renderCategories();
                await renderList();
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        // Render categories
        function renderCategories() {
            const categories = ['all', ...new Set(products.map(p => p.category).filter(Boolean))];
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = categories.map(cat => `
                <span class="category-chip ${selectedCategory === cat ? 'active' : ''}" 
                      onclick="selectCategory('${cat}')">
                    ${cat === 'all' ? 'All' : cat}
                </span>
            `).join('');
        }

        // Select category
        function selectCategory(category) {
            selectedCategory = category;
            renderCategories();
            renderList();
        }

        // Render products
        async function renderList() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = products.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(query) || 
                                     (p.description || '').toLowerCase().includes(query);
                const matchesCategory = selectedCategory === 'all' || p.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            const grid = document.getElementById('productsGrid');
            grid.innerHTML = filtered.map(p => {
                const price = p.price || 0;
                const qty = cart[p.name]?.qty || 0;
                const imgUrl = getImageUrl(p.name);
                
                return `
                    <div class="product-card">
                        <div class="product-image">
                            <img src="${imgUrl}" alt="${p.name}" loading="lazy">
                            <div class="product-badges">
                                ${p.is_authentic_verified ? '<span class="badge badge-verified"><i class="fas fa-check-circle"></i> VERIFIED</span>' : ''}
                                ${p.stock_quantity < 20 ? '<span class="badge badge-stock">LOW STOCK</span>' : ''}
                                ${p.bulk_price && parseFloat(p.bulk_price) > price * 12 ? '<span class="badge badge-sale">SALE</span>' : ''}
                            </div>
                        </div>
                        <div class="product-info">
                            <div class="product-category">${p.category || 'General'}</div>
                            <h4 class="product-name">${p.name}</h4>
                            <p style="font-size: 0.75rem; color: var(--gray-600); margin-bottom: 8px;">${p.description || ''}</p>
                            <div class="product-price">
                                <span class="current-price">R${price.toFixed(2)}</span>
                                ${p.bulk_price && p.bulk_price !== 'N/A' ? `<span class="old-price">R${p.bulk_price}</span>` : ''}
                            </div>
                            <div class="product-actions">
                                <div class="quantity-control">
                                    <button class="qty-btn" onclick="updateCart('${p.name.replace(/'/g, "\\'")}', ${price}, -1)">-</button>
                                    <span class="qty-value">${qty}</span>
                                    <button class="qty-btn" onclick="updateCart('${p.name.replace(/'/g, "\\'")}', ${price}, 1)">+</button>
                                </div>
                                <button class="add-to-cart" onclick="updateCart('${p.name.replace(/'/g, "\\'")}', ${price}, 1)">
                                    <i class="fas fa-shopping-cart"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('') || '<p style="text-align: center; padding: 40px; color: var(--gray-600);">No products found</p>';
            
            updateCartDisplay();
        }

        // Update cart
        function updateCart(name, price, change) {
            if (!cart[name]) cart[name] = { price, qty: 0 };
            cart[name].qty += change;
            if (cart[name].qty <= 0) delete cart[name];
            updateCartDisplay();
            renderList();
        }

        // Update cart display
        function updateCartDisplay() {
            const total = Object.values(cart).reduce((sum, item) => sum + (item.price * item.qty), 0);
            const count = Object.values(cart).reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('txt-total').textContent = `R ${total.toFixed(2)}`;
            document.getElementById('cart-count').textContent = count;
        }

        // Show checkout
        function showCheckout() {
            if (Object.keys(cart).length === 0) {
                alert('Your cart is empty');
                return;
            }

            const list = Object.entries(cart).map(([name, details]) => `
                <div class="receipt-item">
                    <span>${details.qty}x ${name}</span>
                    <span>R${(details.price * details.qty).toFixed(2)}</span>
                </div>
            `).join('');

            const total = Object.values(cart).reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            document.getElementById('checkout-list').innerHTML = `
                <div class="receipt-items">
                    ${list}
                    <div style="margin-top: 16px; padding-top: 16px; border-top: 2px solid var(--primary); font-weight: 800; font-size: 1.2rem; text-align: right;">
                        Total: R${total.toFixed(2)}
                    </div>
                </div>
            `;

            document.getElementById('checkoutModal').classList.remove('hidden');
        }

        // Hide checkout
        function hideCheckout() {
            document.getElementById('checkoutModal').classList.add('hidden');
            document.getElementById('order-error').classList.add('hidden');
        }

        // Select payment
        function selectPayment(method) {
            selectedPayment = method;
            document.getElementById('pay-cash').style.borderColor = method === 'Cash' ? 'var(--primary)' : 'var(--gray-200)';
            document.getElementById('pay-eft').style.borderColor = method === 'EFT' ? 'var(--primary)' : 'var(--gray-200)';
        }

        // Final place order
        async function finalPlaceOrder() {
            if (!currentUser) {
                alert('Please login again');
                logout();
                return;
            }

            showLoading(true);

            try {
                const total = parseFloat(document.getElementById('txt-total').textContent.replace('R ', ''));

                const itemsForDb = {};
                Object.entries(cart).forEach(([name, details]) => {
                    itemsForDb[name] = {
                        qty: details.qty,
                        price: details.price,
                        subtotal: details.price * details.qty
                    };
                });

                const orderData = {
                    profile_id: currentUser.id,
                    store_name: currentUser.store_name,
                    store_address: currentUser.address || 'No address provided',
                    township: currentUser.township || 'Unknown',
                    whatsapp_number: currentUser.whatsapp_number,
                    business_type: currentUser.business_type || 'Spaza Shop',
                    store_size: currentUser.store_size || 'Small/Counter',
                    total_amount: total,
                    items: itemsForDb,
                    payment_method: selectedPayment,
                    status: 'pending',
                    created_at: new Date().toISOString(),
                    is_verified_at_order: currentUser.is_verified || false
                };

                const result = await _client.from('orders').insert([orderData]).select();

                if (result.error) throw result.error;

                const newOrder = result.data[0];

                // Send WhatsApp
                const message = formatWhatsAppMessage(newOrder);
                window.open(`https://wa.me/${ADMIN_WHATSAPP}?text=${encodeURIComponent(message)}`, '_blank');

                // Generate PDF
                await generatePDFReceipt(newOrder);

                showLoading(false);
                alert(`✅ Order #${newOrder.id.slice(-8)} created successfully!`);

                // Reset
                cart = {};
                updateCartDisplay();
                hideCheckout();
                setMode('history');

            } catch (error) {
                showLoading(false);
                document.getElementById('order-error').textContent = '❌ Error: ' + error.message;
                document.getElementById('order-error').classList.remove('hidden');
            }
        }

        // Format WhatsApp message
        function formatWhatsAppMessage(order) {
            const items = Object.entries(order.items).map(([name, details]) => 
                `${details.qty}x ${name} @ R${details.price.toFixed(2)} = R${(details.qty * details.price).toFixed(2)}`
            ).join('\n');

            return `🧾 *SPAZASURE ORDER* 🧾
━━━━━━━━━━━━━━━━━━━━━
*Order #:* ${order.id.slice(-8)}
*Store:* ${order.store_name}
*Business:* ${order.business_type}
*Address:* ${order.store_address}
*Township:* ${order.township}
*Contact:* ${order.whatsapp_number}
*Date:* ${new Date().toLocaleString()}
*Payment:* ${order.payment_method}
━━━━━━━━━━━━━━━━━━━━━
*ITEMS:*
${items}
━━━━━━━━━━━━━━━━━━━━━
*TOTAL: R${order.total_amount.toFixed(2)}*
━━━━━━━━━━━━━━━━━━━━━
✅ Order Confirmed
📦 Status: Pending`;
        }

        // Generate PDF receipt
        async function generatePDFReceipt(order) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(20);
            doc.setTextColor(37, 99, 235);
            doc.text('SPAZASURE', 105, 20, { align: 'center' });

            doc.setFontSize(10);
            doc.setTextColor(100, 116, 139);
            doc.text('Premium Wholesale Supply', 105, 27, { align: 'center' });

            doc.setDrawColor(200, 200, 200);
            doc.line(20, 32, 190, 32);

            let y = 42;
            doc.setFontSize(10);
            doc.setTextColor(0, 0, 0);
            
            const details = [
                `Order #: ${order.id.slice(-8)}`,
                `Store: ${order.store_name}`,
                `Business: ${order.business_type}`,
                `Address: ${order.store_address}`,
                `Township: ${order.township}`,
                `Contact: ${order.whatsapp_number}`,
                `Date: ${new Date(order.created_at).toLocaleString()}`,
                `Payment: ${order.payment_method}`,
                `Status: ${order.status.toUpperCase()}`
            ];

            details.forEach(line => {
                doc.text(line, 20, y);
                y += 6;
            });

            doc.line(20, y, 190, y);
            y += 10;

            // Items
            doc.setFont(undefined, 'bold');
            doc.text('Item', 20, y);
            doc.text('Qty', 120, y);
            doc.text('Price', 140, y);
            doc.text('Total', 165, y);
            doc.setFont(undefined, 'normal');
            y += 5;
            doc.line(20, y, 190, y);
            y += 5;

            let total = 0;
            Object.entries(order.items).forEach(([name, details]) => {
                if (y > 250) {
                    doc.addPage();
                    y = 20;
                }
                
                const qty = details.qty;
                const price = details.price;
                const lineTotal = qty * price;
                total += lineTotal;

                doc.text(name.length > 30 ? name.substring(0, 27) + '...' : name, 20, y);
                doc.text(qty.toString(), 120, y);
                doc.text(`R${price.toFixed(2)}`, 140, y);
                doc.text(`R${lineTotal.toFixed(2)}`, 165, y);
                y += 7;
            });

            doc.line(20, y, 190, y);
            y += 7;

            doc.setFont(undefined, 'bold');
            doc.setFontSize(12);
            doc.text(`TOTAL: R${(order.total_amount || total).toFixed(2)}`, 165, y, { align: 'right' });

            doc.setFont(undefined, 'normal');
            doc.setFontSize(8);
            doc.setTextColor(100, 116, 139);
            doc.text('Thank you for choosing SpazaSure!', 105, 280, { align: 'center' });
            doc.text('Contact: 076 440 3803', 105, 285, { align: 'center' });

            doc.save(`SpazaSure_Order_${order.id.slice(-8)}.pdf`);
        }

        // Set mode
        function setMode(mode) {
            currentMode = mode;
            
            document.getElementById('nav-s').classList.toggle('active', mode === 'single');
            document.getElementById('nav-b').classList.toggle('active', mode === 'bulk');
            document.getElementById('nav-o').classList.toggle('active', mode === 'history');
            
            document.getElementById('categoriesStrip').classList.toggle('hidden', mode !== 'single');
            document.getElementById('productsGrid').classList.toggle('hidden', mode === 'history');
            document.getElementById('ordersList').classList.toggle('hidden', mode !== 'history');
            document.getElementById('floatingCart').classList.toggle('hidden', mode === 'history');
            
            if (mode === 'history') {
                loadOrderHistory();
            } else if (mode === 'bulk') {
                renderBulkDeals();
            } else {
                renderList();
            }
        }

        // Render bulk deals
        function renderBulkDeals() {
            const bulkDeals = products
                .filter(p => p.bulk_price && !isNaN(parseFloat(p.bulk_price)) && parseFloat(p.bulk_price) > p.price * 10)
                .slice(0, 20)
                .map(p => {
                    const bulkNum = parseFloat(p.bulk_price);
                    const savings = ((p.price * 12 - bulkNum) / (p.price * 12) * 100).toFixed(0);
                    return { ...p, savings };
                });

            const grid = document.getElementById('productsGrid');
            grid.innerHTML = bulkDeals.map(p => {
                const imgUrl = getImageUrl(p.name);
                return `
                    <div class="product-card" style="border-left: 4px solid var(--secondary);">
                        <div class="product-image">
                            <img src="${imgUrl}" alt="${p.name}">
                            <div class="product-badges">
                                <span class="badge badge-sale">SAVE ${p.savings}%</span>
                            </div>
                        </div>
                        <div class="product-info">
                            <div class="product-category">${p.category || 'Bulk Deal'}</div>
                            <h4 class="product-name">${p.name}</h4>
                            <div class="product-price">
                                <span class="current-price">R${(parseFloat(p.bulk_price) / 12).toFixed(2)}</span>
                                <span class="old-price">R${p.price.toFixed(2)}</span>
                            </div>
                            <button class="btn btn-primary" style="margin-top: 12px;" onclick="addBulkToCart('${p.name.replace(/'/g, "\\'")}', ${(parseFloat(p.bulk_price) / 12).toFixed(2)})">
                                <i class="fas fa-gift"></i> Grab Deal
                            </button>
                        </div>
                    </div>
                `;
            }).join('') || '<p style="text-align: center; padding: 40px;">No bulk deals available</p>';
        }

        // Add bulk to cart
        function addBulkToCart(name, price) {
            updateCart(name, price, 1);
        }

        // Load order history
        async function loadOrderHistory() {
            try {
                const { data, error } = await _client
                    .from('orders')
                    .select('*')
                    .eq('profile_id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const ordersList = document.getElementById('ordersList');
                ordersList.innerHTML = data && data.length > 0 
                    ? data.map(o => `
                        <div class="order-card">
                            <div class="order-header">
                                <span class="order-id">#${o.id.slice(-8)}</span>
                                <span class="order-status status-${o.status}">${o.status}</span>
                            </div>
                            <div class="order-date">${new Date(o.created_at).toLocaleDateString()}</div>
                            <div class="order-total">R${(o.total_amount || 0).toFixed(2)}</div>
                            <div style="font-size: 0.85rem; color: var(--gray-600); margin-bottom: 16px;">
                                ${o.business_type} • ${o.township}
                            </div>
                            <div class="order-actions">
                                <button class="order-btn btn-view" onclick='viewOrder(${JSON.stringify(o).replace(/'/g, "\\'")})'>
                                    <i class="fas fa-eye"></i> View
                                </button>
                                <button class="order-btn btn-pdf" onclick='generatePDFReceipt(${JSON.stringify(o).replace(/'/g, "\\'")})'>
                                    <i class="fas fa-file-pdf"></i> PDF
                                </button>
                                ${o.status === 'pending' ? `
                                    <button class="order-btn btn-edit" onclick='editOrder(${JSON.stringify(o).replace(/'/g, "\\'")})'>
                                        <i class="fas fa-edit"></i> Edit
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    `).join('')
                    : '<p style="text-align: center; padding: 40px; color: var(--gray-600);">No orders yet. Start shopping!</p>';
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }

        // View order
        function viewOrder(order) {
            const items = Object.entries(order.items).map(([name, detail]) => `
                <div class="receipt-item">
                    <span>${detail.qty}x ${name}</span>
                    <span>R${(detail.price * detail.qty).toFixed(2)}</span>
                </div>
            `).join('');

            document.getElementById('receipt-view').innerHTML = `
                <div class="receipt">
                    <div class="receipt-header">
                        <div class="receipt-logo">SPAZASURE</div>
                        <div style="color: var(--gray-600); font-size: 0.9rem;">Premium Wholesale</div>
                    </div>
                    <div class="receipt-divider"></div>
                    
                    <div class="receipt-row"><span>Order #:</span> <span>${order.id.slice(-8)}</span></div>
                    <div class="receipt-row"><span>Store:</span> <span>${order.store_name}</span></div>
                    <div class="receipt-row"><span>Business:</span> <span>${order.business_type}</span></div>
                    <div class="receipt-row"><span>Address:</span> <span>${order.store_address}</span></div>
                    <div class="receipt-row"><span>Township:</span> <span>${order.township}</span></div>
                    <div class="receipt-row"><span>Date:</span> <span>${new Date(order.created_at).toLocaleString()}</span></div>
                    <div class="receipt-row"><span>Payment:</span> <span>${order.payment_method}</span></div>
                    <div class="receipt-row"><span>Status:</span> <span style="color: ${order.status === 'pending' ? 'var(--warning)' : 'var(--secondary)'}">${order.status.toUpperCase()}</span></div>
                    
                    <div class="receipt-divider"></div>
                    
                    <div class="receipt-items">
                        ${items}
                    </div>
                    
                    <div class="receipt-divider"></div>
                    
                    <div class="receipt-total">
                        TOTAL: R${(order.total_amount || 0).toFixed(2)}
                    </div>
                    
                    <div class="qr-code" id="qrCodeContainer"></div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px;">
                        <button class="btn btn-primary" onclick="resendWhatsApp('${order.id}')">
                            <i class="fab fa-whatsapp"></i> WhatsApp
                        </button>
                        <button class="btn btn-secondary" onclick="generatePDFReceipt(${JSON.stringify(order).replace(/'/g, "\\'")})">
                            <i class="fas fa-file-pdf"></i> PDF
                        </button>
                    </div>
                    <button class="btn btn-secondary" style="margin-top: 12px;" onclick="document.getElementById('orderDetailModal').classList.add('hidden')">
                        Close
                    </button>
                </div>
            `;

            // Generate QR code
            document.getElementById('qrCodeContainer').innerHTML = '';
            new QRCode(document.getElementById('qrCodeContainer'), {
                text: `SpazaSure Order:${order.id}\nTotal:R${order.total_amount}`,
                width: 150,
                height: 150
            });

            document.getElementById('orderDetailModal').classList.remove('hidden');
        }

        // Resend WhatsApp
        async function resendWhatsApp(orderId) {
            try {
                const { data: order, error } = await _client.from('orders').select('*').eq('id', orderId).single();
                if (error) throw error;
                
                const message = formatWhatsAppMessage(order);
                window.open(`https://wa.me/${ADMIN_WHATSAPP}?text=${encodeURIComponent(message)}`, '_blank');
            } catch (error) {
                console.error('Error resending WhatsApp:', error);
                alert('Failed to resend WhatsApp message');
            }
        }

        // Edit order
        function editOrder(order) {
            cart = order.items || {};
            editingOrderId = order.id;
            updateCartDisplay();
            setMode('single');
            hideCheckout();
            showCheckout();
        }

        // Show/hide loading
        function showLoading(show) {
            document.getElementById('loadingSpinner').classList.toggle('hidden', !show);
        }

        // Show error
        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        // Logout
        function logout() {
            localStorage.clear();
            currentUser = null;
            cart = {};
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('mainSection').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
        }
    </script>
</body>
</html>
